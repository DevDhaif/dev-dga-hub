name: Feature request
description: Ask for a new component, prop, or improvement
labels: [enhancement]
body:
  - type: dropdown
    id: kind
    attributes:
      label: What kind of request?
      options:
        - New component
        - New prop or variant on an existing component
        - Docs site improvement
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: The use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: >-
        For new components, link the DGA Platforms Code spec or attach a
        screenshot if you can.
    validations:
      required: true
